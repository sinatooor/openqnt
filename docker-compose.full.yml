# Full-stack overlay for openqwnt:
# - keeps backend + frontend from docker-compose.yml
# - adds orchestrator + postgres + redis for the control-plane path

services:
  frontend:
    environment:
      # Browser must reach orchestrator via host-mapped port.
      VITE_ORCHESTRATOR_URL: ${VITE_ORCHESTRATOR_URL:-http://localhost:3000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3000}

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
      target: development
    image: openqwnt-orchestrator:dev
    container_name: openqwnt-orchestrator
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/strategyflow?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      COMPUTE_SERVICE_URL: http://backend:8000
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-32-chars-long!}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    volumes:
      - ./orchestrator:/app
      - openqwnt-orchestrator-node_modules:/app/node_modules
    # First boot: generate Prisma client, push the schema (no migration
    # files exist under prisma/migrations/, so `migrate deploy` would
    # fail), seed sample data, then start the dev server.
    command: >-
      sh -c "bun run db:generate && bunx prisma db push --accept-data-loss && bun run db:seed && bun run dev"
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: openqwnt-postgres
    environment:
      POSTGRES_DB: strategyflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - openqwnt-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d strategyflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: openqwnt-redis
    ports:
      - "6379:6379"
    volumes:
      - openqwnt-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  openqwnt-orchestrator-node_modules:
    driver: local
    name: openqwnt-orchestrator-node_modules
  openqwnt-postgres-data:
    driver: local
    name: openqwnt-postgres-data
  openqwnt-redis-data:
    driver: local
    name: openqwnt-redis-data