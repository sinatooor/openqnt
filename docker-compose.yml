# =============================================================================
# Fyer Trading Platform - Docker Compose
# Complete development and production environment
# =============================================================================
# Usage:
#   Development: docker-compose up
#   Production:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
#   Build:       docker-compose build
# =============================================================================

services:
  # ===========================================================================
  # Backend API - FastAPI with AI Agents
  # ===========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development # Change to 'production' for prod builds
    container_name: fyer-backend
    ports:
      - "8000:8000"
    environment:
      # LLM API Keys (override via .env file)
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Broker API Keys
      - IG_API_KEY=${IG_API_KEY:-}
      - IG_USERNAME=${IG_USERNAME:-}
      - IG_PASSWORD=${IG_PASSWORD:-}
      - IG_ACCOUNT_TYPE=${IG_ACCOUNT_TYPE:-DEMO}
      # Database
      - DATABASE_URL=sqlite:///./fyer.db
      - CHROMA_PERSIST_DIRECTORY=/app/chroma_db_v2
      # Environment
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
    volumes:
      # Mount source code for hot reloading in development
      - ./backend:/app
      # Persist ChromaDB data
      - fyer-chroma-data:/app/chroma_db_v2
      # Persist SQLite database
      - fyer-db-data:/app/data
      # Persist logs
      - fyer-logs:/app/logs
    networks:
      - fyer-network
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================================================
  # Frontend - React/Vite (Development)
  # ===========================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: fyer-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    volumes:
      # Mount source for hot reloading
      - ./src:/app/src
      - ./public:/app/public
      # Exclude node_modules
      - /app/node_modules
    networks:
      - fyer-network
    depends_on:
      - backend
    profiles:
      - frontend # Only start with: docker-compose --profile frontend up

  # ===========================================================================
  # Node.js Orchestrator - Primary API + Workflow Engine
  # ===========================================================================
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
      target: development
    container_name: fyer-orchestrator
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/strategyflow
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - COMPUTE_SERVICE_URL=http://backend:8000
      - FRONTEND_URL=http://localhost:5173
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-dev-encryption-key-32-chars-long!}
      - LOG_LEVEL=info
    volumes:
      - ./orchestrator/src:/app/src
      - ./orchestrator/prisma:/app/prisma
      - /app/node_modules
    networks:
      - fyer-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================================================
  # PostgreSQL - Primary Database
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: fyer-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=strategyflow
    volumes:
      - fyer-postgres-data:/var/lib/postgresql/data
    networks:
      - fyer-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Redis - BullMQ broker, caching, pub/sub
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: fyer-redis
    ports:
      - "6379:6379"
    volumes:
      - fyer-redis-data:/data
    networks:
      - fyer-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # ChromaDB - Vector database for RAG (Optional standalone)
  # ===========================================================================
  # chromadb:
  #   image: chromadb/chroma:latest
  #   container_name: fyer-chromadb
  #   ports:
  #     - "8001:8000"
  #   volumes:
  #     - fyer-chroma-data:/chroma/chroma
  #   networks:
  #     - fyer-network
  #   environment:
  #     - ANONYMIZED_TELEMETRY=False
  #   profiles:
  #     - chromadb

  # ===========================================================================
  # Nginx - Reverse proxy (Production)
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: fyer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - fyer-network
    depends_on:
      - backend
    profiles:
      - production

# =============================================================================
# Networks
# =============================================================================
networks:
  fyer-network:
    driver: bridge

# =============================================================================
# Volumes - Persistent data storage
# =============================================================================
volumes:
  fyer-chroma-data:
    driver: local
  fyer-db-data:
    driver: local
  fyer-postgres-data:
    driver: local
  fyer-redis-data:
    driver: local
  fyer-logs:
    driver: local
