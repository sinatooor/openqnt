# =============================================================================
# openqwnt — production-shaped compose file.
#
# Two services match what `scripts/start-all.sh` runs locally:
#   - backend  : FastAPI (Phase B-J), port 8000
#   - frontend : Vite dev server, port 5173
#
# Run with `docker compose up`. The default targets the dev stages so you
# get hot reload + source mounts. For a closer-to-prod build, override the
# targets:  `docker compose -f docker-compose.yml -f docker-compose.prod.yml up`.
#
# Broker selection follows EXECUTION_BROKER (paper / ibkr / alpaca). For
# `ibkr` mode TWS / IB Gateway must be running ON THE HOST — the backend
# reaches it via `host.docker.internal:7497` (auto-mapped on Docker
# Desktop, explicit `extra_hosts` entry below for Linux).
#
# Removed from the previous version:
#   - Postgres        : Phase B-J persists to disk under `agents/`, no DB.
#   - Redis           : we don't queue jobs.
#   - orchestrator    : legacy Node service, not on the Phase B-J path.
#   - chromadb        : RAG isn't part of any shipped phase.
#   - nginx (top-lvl) : the prod frontend stage already serves through nginx.
# =============================================================================

x-backend-base: &backend-base
  build:
    context: ./backend
    dockerfile: Dockerfile
    target: dev
  image: openqwnt-backend:dev
  environment:
    # ── broker selection (Phase H) ─────────────────────────────────────
    EXECUTION_BROKER: ${EXECUTION_BROKER:-paper}
    # IBKR (TWS / IB Gateway lives on the host)
    IB_HOST: ${IB_HOST:-host.docker.internal}
    IB_PORT: ${IB_PORT:-7497}
    IB_CLIENT_ID: ${IB_CLIENT_ID:-42}
    # Alpaca (only used when EXECUTION_BROKER=alpaca)
    ALPACA_API_KEY: ${ALPACA_API_KEY:-}
    ALPACA_API_SECRET: ${ALPACA_API_SECRET:-}
    # ── risk gate caps ─────────────────────────────────────────────────
    PAPER_CASH: ${PAPER_CASH:-100000}
    RISK_MAX_ORDER_QTY: ${RISK_MAX_ORDER_QTY:-1000}
    RISK_MAX_POSITION_NOTIONAL: ${RISK_MAX_POSITION_NOTIONAL:-50000}
    RISK_MAX_DRAWDOWN_PCT: ${RISK_MAX_DRAWDOWN_PCT:-20}
    RISK_MAX_DAILY_LOSS_PCT: ${RISK_MAX_DAILY_LOSS_PCT:-5}
    # ── optional LLM (boss + improvement mutator) ──────────────────────
    GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    # ── optional terminal data sources (Phase F) ───────────────────────
    FMP_API_KEY: ${FMP_API_KEY:-}
  ports:
    - "8000:8000"
  # Linux: extra_hosts gives `host.docker.internal` access to the host
  # network for IBKR. Docker Desktop (mac/win) maps it automatically.
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    # Source mount: code changes propagate without rebuilding the image.
    - ./backend:/app
    # Persist EVERYTHING the platform writes between restarts:
    #   _backtests, _execution (panic.lock, orders.jsonl), _telemetry,
    #   _cache (yfinance parquet + matplotlib font cache), tools/dynamic,
    #   boss/runs (incl. improvement_tree).
    - openqwnt-agents:/app/agents
  healthcheck:
    test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 15s
  restart: unless-stopped

services:
  backend:
    <<: *backend-base
    container_name: openqwnt-backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: dev
      args:
        VITE_BACKEND_URL: http://localhost:8000
    image: openqwnt-frontend:dev
    container_name: openqwnt-frontend
    environment:
      # In the browser, the backend URL must be reachable from the host.
      VITE_BACKEND_URL: http://localhost:8000
      VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.app.json:/app/tsconfig.app.json
      - ./tsconfig.node.json:/app/tsconfig.node.json
      - ./tailwind.config.ts:/app/tailwind.config.ts
      - ./postcss.config.js:/app/postcss.config.js
      # Keep the container's own node_modules — never let the host
      # version (potentially built for darwin) shadow what `npm ci`
      # produced inside the image.
      - openqwnt-frontend-node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  openqwnt-agents:
    driver: local
    name: openqwnt-agents
  openqwnt-frontend-node_modules:
    driver: local
    name: openqwnt-frontend-node_modules
