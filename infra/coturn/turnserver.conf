# OpenQnt TURN server config — required for WebRTC over cellular NAT.
# In production, swap the static credential out for an ephemeral
# time-limited credential mechanism (REST API per RFC 7635).

listening-port=3478
fingerprint
lt-cred-mech
realm=openqnt.local

# Static long-term credential (DEV ONLY — replace before exposing publicly)
user=openqnt:change-me-in-production

# Bind to all interfaces; TURN needs raw UDP, so the docker service uses
# host networking (see docker-compose.full.yml).
external-ip=0.0.0.0

no-multicast-peers
no-cli
