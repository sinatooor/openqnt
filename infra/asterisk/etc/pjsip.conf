; OpenQnt — minimal PJSIP config for the Linphone power-user path.
;
; One template per OpenQnt user. In production, generate this file from the
; users table (e.g. on backend startup or via a generator command). For
; getting-started, configure a single static "openqnt" extension.

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

[transport-tcp]
type = transport
protocol = tcp
bind = 0.0.0.0:5060

;; ───────────────────── Endpoint template ─────────────────────────────
[endpoint-template](!)
type = endpoint
context = openqnt
disallow = all
allow = ulaw
allow = alaw
allow = opus            ; preferred when client supports it
direct_media = no
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
ice_support = yes        ; helps Linphone over NAT
dtls_auto_generate_cert = no   ; SRTP is optional for v3 — enable later
trust_id_inbound = yes

[auth-template](!)
type = auth
auth_type = userpass

[aor-template](!)
type = aor
max_contacts = 2
qualify_frequency = 30

;; ───────────────────── Static "openqnt" account ──────────────────────
;; Update the password before exposing this server. Linphone register URI:
;;   sip:openqnt@<your-asterisk-host>
[openqnt](endpoint-template)
auth = openqnt-auth
aors = openqnt

[openqnt-auth](auth-template)
username = openqnt
password = change-me-in-production

[openqnt](aor-template)
