; OpenQnt — dialplan. The bridge runs entirely inside the Stasis app
; "openqnt-voice", which is driven by backend/services/voice/ari_bridge.py
; over ARI. The dialplan just hands off and gets out of the way.

[globals]

[openqnt]
exten = _X.,1,NoOp(OpenQnt incoming from ${CHANNEL})
 same = n,Answer()
 same = n,Stasis(openqnt-voice)
 same = n,Hangup()

; Originated calls (backend → user's Linphone) land in the same Stasis app.
[openqnt-originate]
exten = _X.,1,NoOp(OpenQnt outbound to ${EXTEN})
 same = n,Stasis(openqnt-voice)
 same = n,Hangup()
