# Apply on top of docker-compose.yml for a closer-to-prod build:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
#
# - backend  : built with target=prod (source COPY'd, no --reload)
# - frontend : built with target=prod (Vite build → nginx, port 80)

services:
  backend:
    build:
      target: prod
    image: openqwnt-backend:prod
    # Drop the source mount; the prod image carries its own copy.
    volumes:
      - openqwnt-agents:/app/agents

  frontend:
    build:
      target: prod
      args:
        # Compiled into the JS bundle, so the *browser* must be able to
        # reach this host. For a real deployment, set this to your public
        # backend URL via the .env file.
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8000}
    image: openqwnt-frontend:prod
    ports:
      - "80:80"
    volumes: []
